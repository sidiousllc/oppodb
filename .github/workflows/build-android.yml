name: Build Android

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      output_format:
        description: 'Output format'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          accept-android-sdk-licenses: true
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor (regenerates Android plugin scaffolding)
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Validate release secrets
        if: ${{ inputs.build_type == 'release' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          [ -z "$ANDROID_KEYSTORE_BASE64" ]    && missing+=("ANDROID_KEYSTORE_BASE64")
          [ -z "$ANDROID_KEYSTORE_PASSWORD" ]  && missing+=("ANDROID_KEYSTORE_PASSWORD")
          [ -z "$ANDROID_KEY_ALIAS" ]          && missing+=("ANDROID_KEY_ALIAS")
          [ -z "$ANDROID_KEY_PASSWORD" ]       && missing+=("ANDROID_KEY_PASSWORD")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required release secrets: ${missing[*]}"
            echo "Add them in GitHub repo Settings → Secrets and variables → Actions, or pick 'debug' build_type."
            exit 1
          fi

      - name: Decode keystore
        if: ${{ inputs.build_type == 'release' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks

      - name: Build Debug APK
        if: ${{ inputs.build_type == 'debug' && inputs.output_format == 'apk' }}
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Debug AAB
        if: ${{ inputs.build_type == 'debug' && inputs.output_format == 'aab' }}
        working-directory: android
        run: ./gradlew bundleDebug --stacktrace

      - name: Build Release APK
        if: ${{ inputs.build_type == 'release' && inputs.output_format == 'apk' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --stacktrace \
            -Pandroid.injected.signing.store.file=$PWD/app/release-keystore.jks \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Build Release AAB
        if: ${{ inputs.build_type == 'release' && inputs.output_format == 'aab' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease --stacktrace \
            -Pandroid.injected.signing.store.file=$PWD/app/release-keystore.jks \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Upload Debug APK
        if: ${{ inputs.build_type == 'debug' && inputs.output_format == 'apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: ordb-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Debug AAB
        if: ${{ inputs.build_type == 'debug' && inputs.output_format == 'aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: ordb-debug-aab
          path: android/app/build/outputs/bundle/debug/app-debug.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK
        if: ${{ inputs.build_type == 'release' && inputs.output_format == 'apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: ordb-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release AAB
        if: ${{ inputs.build_type == 'release' && inputs.output_format == 'aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: ordb-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload Gradle reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports
          path: |
            android/app/build/reports/
            android/build/reports/
          if-no-files-found: ignore
          retention-days: 7
