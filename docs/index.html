<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OppoDB Help</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="desktop">
    <div class="help-window active" id="main-help">
      <div class="title-bar">
        <div class="title-bar-text">OppoDB Help</div>
        <div class="title-bar-controls">
          <button class="title-btn" aria-label="Help">?</button>
          <button class="title-btn" aria-label="Close">×</button>
        </div>
      </div>
      <div class="window-body">
        <div class="toolbar">
          <button class="tb-btn" title="Back">←</button>
          <button class="tb-btn" title="Forward">→</button>
          <button class="tb-btn" title="Up">↑</button>
          <div class="toolbar-sep"></div>
          <button class="tb-btn" title="Options">≡</button>
        </div>
        <div class="content-area">
          <div class="nav-pane">
            <div class="tab-row">
              <button class="tab active" data-tab="contents">Contents</button>
              <button class="tab" data-tab="search">Search</button>
              <button class="tab" data-tab="favorites">Favorites</button>
            </div>
            <div class="tab-content active" id="contents">
              <div class="tree-view" id="tree-view"></div>
            </div>
            <div class="tab-content" id="search">
              <div class="search-box">
                <input type="text" class="win98-input" placeholder="Type keywords..." id="search-input">
                <button class="win98-btn">Search</button>
              </div>
              <div class="search-results" id="search-results"></div>
            </div>
            <div class="tab-content" id="favorites">
              <p class="note">No favorites yet. Click the "Add to Favorites" button to save topics.</p>
            </div>
          </div>
          <div class="divider-vertical"></div>
          <div class="topic-pane">
            <div class="topic-header">
              <span class="breadcrumb" id="breadcrumb">Home</span>
            </div>
            <div class="topic-content" id="topic-content">
              <!-- Content loaded here -->
            </div>
            <div class="status-bar">
              <span class="status-text" id="status-text">Press F1 for Help</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- About Dialog -->
    <div class="help-window dialog" id="about-dialog" style="display:none">
      <div class="title-bar">
        <div class="title-bar-text">About OppoDB Help</div>
        <div class="title-bar-controls">
          <button class="title-btn" aria-label="Close" onclick="closeDialog()">×</button>
        </div>
      </div>
      <div class="window-body dialog-body">
        <div class="about-content">
          <div class="win98-logo">🐙</div>
          <div class="about-text">
            <p class="prog-name">OppoDB Help</p>
            <p>Version 1.0</p>
            <p>Political Intelligence Database</p>
            <p class="copyright">© 2026 OppoDB</p>
          </div>
        </div>
        <div class="dialog-buttons">
          <button class="win98-btn" onclick="closeDialog()">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
